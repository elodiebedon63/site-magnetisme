<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Visualisation de l'arbre — Élodie Bedon, Énergéticienne" />
  <title>Visualisation de l'arbre — Élodie Bedon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --beige: #f0f5f7;
      --sage-dark: #0B6281;
      --brown: #062f3e;
      --text: #1a2e35;
      --text-light: #4a6a75;
      --white: #f8fbfc;
    }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--brown);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .back-link {
      position: fixed;
      top: 1.5rem; left: 2rem;
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color .3s;
      z-index: 10;
    }
    .back-link:hover { color: var(--white); }
    .video-container {
      width: 90vw;
      max-width: 960px;
      aspect-ratio: 16/9;
    }
    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 4px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.4rem, 3vw, 2rem);
      margin-bottom: 2rem;
      color: var(--beige);
      text-align: center;
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Retour au site
  </a>
  <h1>Visualisation de l'arbre</h1>
  <div class="video-container">
    <iframe
      src="https://www.youtube.com/embed/pqkXfC8QDU4"
      title="Visualisation de l'arbre"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    ></iframe>
  </div>
</body>
</html>
