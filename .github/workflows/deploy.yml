name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Historique complet requis : la date « Dernière mise à jour » des pages
          # légales est déduite du dernier commit de chaque fichier (cf. lib/date.ts).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Astro)
        run: npm run build
        env:
          # Domaine dédié, par ordre de priorité (cf. astro.config.mjs) :
          #  1. fichier CNAME à la racine (créé par GitHub quand un domaine est configuré
          #     dans Settings → Pages) ;
          #  2. sinon cette variable CUSTOM_DOMAIN (Settings → Secrets and variables →
          #     Actions → Variables, ex : elodie-magnetisme.fr).
          # Absente et pas de CNAME → site sur github.io/site-magnetisme/.
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro génère le site statique dans dist/ (cf. astro.config.mjs).
          path: dist

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4